<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Космический сборщик звёзд</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:10px;
}

#ui{
    font-size:22px;
    margin:10px;
}

canvas{
    display:block;
    margin:0 auto;
    border:2px solid white;
    background:#050510;
}
</style>

</head>
<body>

<h1>⭐ Космический сборщик звёзд ⭐</h1>

<div id="ui">
    Очки: <span id="score">0</span>
    |
    Рекорд: <span id="best">0</span>
    |
    Время: <span id="time">60</span>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreText = document.getElementById("score");
const bestText = document.getElementById("best");
const timeText = document.getElementById("time");

let bestScore = Number(localStorage.getItem("bestScore")) || 0;
bestText.textContent = bestScore;

let score = 0;
let gameOver = false;
let timeLeft = 60;

const player = {
    x: 400,
    y: 250,
    size: 30,
    speed: 5
};

const enemy = {
    x: 100,
    y: 100,
    size: 30,
    speed: 1.7
};

const keys = {};

const star = {
    x: 0,
    y: 0,
    radius: 12
};

function spawnStar(){
    star.x = Math.random() * (canvas.width - 50) + 25;
    star.y = Math.random() * (canvas.height - 50) + 25;
}

spawnStar();

window.addEventListener("keydown", e=>{
    keys[e.key] = true;

    if(gameOver && e.key.toLowerCase() === "r"){
        restart();
    }
});

window.addEventListener("keyup", e=>{
    keys[e.key] = false;
});

function update(){

    if(gameOver) return;

    if(keys["ArrowUp"] || keys["w"])
        player.y -= player.speed;

    if(keys["ArrowDown"] || keys["s"])
        player.y += player.speed;

    if(keys["ArrowLeft"] || keys["a"])
        player.x -= player.speed;

    if(keys["ArrowRight"] || keys["d"])
        player.x += player.speed;

    player.x = Math.max(0, Math.min(canvas.width-player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height-player.size, player.y));

    if(enemy.x < player.x) enemy.x += enemy.speed;
    if(enemy.x > player.x) enemy.x -= enemy.speed;

    if(enemy.y < player.y) enemy.y += enemy.speed;
    if(enemy.y > player.y) enemy.y -= enemy.speed;

    const dx = (player.x + player.size/2) - star.x;
    const dy = (player.y + player.size/2) - star.y;

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < player.size/2 + star.radius){

        score++;
        scoreText.textContent = score;

        spawnStar();

        if(score % 5 === 0){
            enemy.speed += 0.2;
            player.speed += 0.1;
        }
    }

    if(
        player.x < enemy.x + enemy.size &&
        player.x + player.size > enemy.x &&
        player.y < enemy.y + enemy.size &&
        player.y + player.size > enemy.y
    ){
        finishGame();
    }
}

function drawBackground(){

    const gradient = ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,"#000015");
    gradient.addColorStop(1,"#050535");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    for(let i=0;i<80;i++){
        ctx.fillRect(
            (i*97)%canvas.width,
            (i*53)%canvas.height,
            2,
            2
        );
    }
}

function draw(){

    drawBackground();

    ctx.shadowBlur = 20;
    ctx.shadowColor = "yellow";

    ctx.beginPath();
    ctx.fillStyle = "gold";
    ctx.arc(
        star.x,
        star.y,
        star.radius + Math.sin(Date.now()*0.01)*2,
        0,
        Math.PI*2
    );
    ctx.fill();

    ctx.shadowBlur = 15;
    ctx.shadowColor = "lime";

    ctx.fillStyle = "lime";
    ctx.fillRect(
        player.x,
        player.y,
        player.size,
        player.size
    );

    ctx.shadowBlur = 15;
    ctx.shadowColor = "red";

    ctx.fillStyle = "red";
    ctx.fillRect(
        enemy.x,
        enemy.y,
        enemy.size,
        enemy.size
    );

    ctx.shadowBlur = 0;

    if(gameOver){

        ctx.fillStyle="rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle="white";
        ctx.font="50px Arial";
        ctx.textAlign="center";

        ctx.fillText(
            "ИГРА ОКОНЧЕНА",
            canvas.width/2,
            canvas.height/2-30
        );

        ctx.font="25px Arial";

        ctx.fillText(
            "Нажми R для рестарта",
            canvas.width/2,
            canvas.height/2+30
        );
    }
}

function finishGame(){

    gameOver = true;

    if(score > bestScore){
        bestScore = score;
        localStorage.setItem("bestScore", bestScore);
        bestText.textContent = bestScore;
    }
}

function restart(){

    score = 0;
    scoreText.textContent = score;

    timeLeft = 60;
    timeText.textContent = timeLeft;

    gameOver = false;

    player.x = 400;
    player.y = 250;
    player.speed = 5;

    enemy.x = 100;
    enemy.y = 100;
    enemy.speed = 1.7;

    spawnStar();
}

setInterval(()=>{

    if(gameOver) return;

    timeLeft--;

    timeText.textContent = timeLeft;

    if(timeLeft <= 0){
        finishGame();
    }

},1000);

function gameLoop(){

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
